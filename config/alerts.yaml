# MCP Super-Server Alert Rules for Loki
# Reference: https://grafana.com/docs/loki/latest/alert/

apiVersion: 1

groups:
  - name: mcp-super-server-critical
    interval: 1m
    rules:
      # High Error Rate Alert
      - alert: HighErrorRate
        expr: |
          sum(rate({app="mcp-super-server"} |= "error" |= "[Error]" [1m])) > 1
        for: 2m
        labels:
          severity: critical
          team: platform
          service: mcp-super-server
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors/min, exceeding critical threshold of 1/min"
          runbook_url: "https://docs.mcp-super-server.io/runbooks/high-error-rate"
          action: "Check logs: sum(rate({app=\"mcp-super-server\"} |= \"error\" [5m]))"

      # Tool Gate Denials Spike
      - alert: ToolGateDenialsSpike
        expr: |
          sum(rate({app="mcp-super-server"} |= "BUDGET_EXCEEDED" or |= "TOOL_BLOCKED" or |= "deny" [1m])) > 50
        for: 1m
        labels:
          severity: critical
          team: platform
          service: mcp-super-server
        annotations:
          summary: "Tool gate denials spiking"
          description: "{{ $value }} denials/min - possible policy misconfiguration or abuse"

      # Plan Failure Rate Spike
      - alert: PlanFailureRateSpike
        expr: |
          sum(rate({app="mcp-super-server"} |= "orchestrator" |= "plan_failed" or |= "step_failed" [1m])) > 20
        for: 2m
        labels:
          severity: critical
          team: platform
          service: mcp-super-server
        annotations:
          summary: "Plan execution failures spiking"
          description: "{{ $value }} plan failures/min - check orchestrator health"

      # High Voice Turn Latency
      - alert: HighVoiceTurnLatency
        expr: |
          avg_over_time({app="mcp-super-server"} |= "emit_turn_finalized" [5m]) > 2000
        for: 5m
        labels:
          severity: critical
          team: voice
          service: mcp-super-server
        annotations:
          summary: "Voice turn latency exceeds 2000ms"
          description: "Average turn latency is {{ $value }}ms - ASR or processing may be degraded"

  - name: mcp-super-server-warning
    interval: 1m
    rules:
      # Moderate Error Rate
      - alert: ModerateErrorRate
        expr: |
          sum(rate({app="mcp-super-server"} |= "error" |= "[Error]" [1m])) > 0.1
        for: 5m
        labels:
          severity: warning
          team: platform
          service: mcp-super-server
        annotations:
          summary: "Moderate error rate detected"
          description: "Error rate is {{ $value }} errors/min, exceeding warning threshold"

      # High Session Creation Rate
      - alert: HighSessionCreationRate
        expr: |
          sum(rate({app="mcp-super-server"} |= "emit_turn_started" [1m])) > 100
        for: 5m
        labels:
          severity: warning
          team: voice
          service: mcp-super-server
        annotations:
          summary: "High session creation rate"
          description: "{{ $value }} sessions/min - approaching capacity limits"

      # High Tool Invocation Rate
      - alert: HighToolInvocationRate
        expr: |
          sum(rate({app="mcp-super-server"} |= "ToolCallCompleted" [1m])) > 200
        for: 5m
        labels:
          severity: warning
          team: platform
          service: mcp-super-server
        annotations:
          summary: "High tool invocation rate"
          description: "{{ $value }} tool calls/min - monitor gate performance"

      # Tool Gate Denials Warning
      - alert: ToolGateDenialsWarning
        expr: |
          sum(rate({app="mcp-super-server"} |= "BUDGET_EXCEEDED" or |= "TOOL_BLOCKED" or |= "deny" [1m])) > 10
        for: 5m
        labels:
          severity: warning
          team: platform
          service: mcp-super-server
        annotations:
          summary: "Elevated tool gate denials"
          description: "{{ $value }} denials/min - review gate policies"

      # Plan Execution Slow
      - alert: SlowPlanExecution
        expr: |
          avg({app="mcp-super-server"} |= "orchestrator" |= "plan_completed" | json | unwrap duration_ms [5m]) > 5000
        for: 5m
        labels:
          severity: warning
          team: platform
          service: mcp-super-server
        annotations:
          summary: "Slow plan execution detected"
          description: "Average plan duration {{ $value }}ms exceeds 5000ms threshold"

      # High Barge-in Rate
      - alert: HighBargeInRate
        expr: |
          sum(rate({app="mcp-super-server"} |= "emit_tool_canceled" |= "barge" [1m])) > 50
        for: 5m
        labels:
          severity: warning
          team: voice
          service: mcp-super-server
        annotations:
          summary: "High barge-in rate"
          description: "{{ $value }} barge-ins/min - may indicate TTS pacing issues"

      # Plan Failure Rate Warning
      - alert: PlanFailureRateWarning
        expr: |
          sum(rate({app="mcp-super-server"} |= "orchestrator" |= "plan_failed" or |= "step_failed" [1m])) > 5
        for: 5m
        labels:
          severity: warning
          team: platform
          service: mcp-super-server
        annotations:
          summary: "Elevated plan failure rate"
          description: "{{ $value }} failures/min - check tool health and dependencies"

      # Many Active Sessions
      - alert: ManyActiveSessions
        expr: |
          count_over_time({app="mcp-super-server"} |= "emit_turn_started" [1h]) - count_over_time({app="mcp-super-server"} |= "emit_turn_finalized" [1h]) > 100
        for: 5m
        labels:
          severity: warning
          team: voice
          service: mcp-super-server
        annotations:
          summary: "High number of active sessions"
          description: "{{ $value }} active sessions - monitor resource utilization"

  - name: mcp-super-server-info
    interval: 5m
    rules:
      # Health Check - Orchestrator
      - alert: OrchestratorHealthCheck
        expr: |
          absent_over_time({app="mcp-super-server"} |= "orchestrator" [10m]) == 1
        for: 5m
        labels:
          severity: info
          team: platform
          service: mcp-super-server
        annotations:
          summary: "No orchestrator logs in 10 minutes"
          description: "The orchestrator component may be idle or experiencing issues"

      # Health Check - Voice FSM
      - alert: VoiceFSMHealthCheck
        expr: |
          absent_over_time({app="mcp-super-server"} |= "[FSM]" [10m]) == 1
        for: 5m
        labels:
          severity: info
          team: voice
          service: mcp-super-server
        annotations:
          summary: "No voice FSM logs in 10 minutes"
          description: "The voice FSM component may be idle or experiencing issues"

# Alert routing configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

  # Notification templates
  templates:
    - /etc/loki/alert_templates.tmpl

# Recording rules for dashboards
recording_rules:
  - record: mcp:error_rate_1m
    expr: sum(rate({app="mcp-super-server"} |= "error" |= "[Error]" [1m]))

  - record: mcp:session_creation_rate_1m
    expr: sum(rate({app="mcp-super-server"} |= "emit_turn_started" [1m]))

  - record: mcp:tool_invocation_rate_1m
    expr: sum(rate({app="mcp-super-server"} |= "ToolCallCompleted" [1m]))

  - record: mcp:plan_failure_rate_1m
    expr: sum(rate({app="mcp-super-server"} |= "orchestrator" |= "plan_failed" or |= "step_failed" [1m]))

  - record: mcp:barge_in_rate_1m
    expr: sum(rate({app="mcp-super-server"} |= "emit_tool_canceled" |= "barge" [1m]))
