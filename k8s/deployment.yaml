apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-super-server
  labels:
    app: mcp-super-server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mcp-super-server
  template:
    metadata:
      labels:
        app: mcp-super-server
    spec:
      containers:
        - name: server
          image: mcp-super-server:latest
          ports:
            - containerPort: 3000
          env:
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mcp-secrets
                  key: supabase-url
            - name: SUPABASE_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: mcp-secrets
                  key: supabase-service-key
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-super-server
spec:
  selector:
    app: mcp-super-server
  ports:
    - port: 80
      targetPort: 3000
  type: LoadBalancer
